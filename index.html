<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peten's Blog</title>
  <meta name="description" content="Peten의 블로그" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="./" class="site-title">Peten's Blog</a>
      <p class="site-tagline">생각과 기록</p>
    </div>
  </header>

  <main class="container">
    <section id="post-list" class="post-list" aria-busy="true">
      <p class="loading">포스트를 불러오는 중…</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Peten</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const listEl = document.getElementById('post-list');

    fetch('posts.json', { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error('posts.json 로드 실패');
        return r.json();
      })
      .then(data => {
        const posts = (data.posts || []).slice().sort((a, b) => b.date.localeCompare(a.date));
        listEl.removeAttribute('aria-busy');

        if (posts.length === 0) {
          listEl.innerHTML = '<p class="empty">아직 작성된 포스트가 없습니다.</p>';
          return;
        }

        listEl.innerHTML = posts.map(p => `
          <article class="post-item">
            <time class="post-date">${formatDate(p.date)}</time>
            <h2 class="post-title">
              <a href="post.html?slug=${encodeURIComponent(p.slug)}">${escapeHtml(p.title)}</a>
            </h2>
            ${p.summary ? `<p class="post-summary">${escapeHtml(p.summary)}</p>` : ''}
            ${p.tags && p.tags.length ? `<div class="post-tags">${p.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          </article>
        `).join('');
      })
      .catch(err => {
        listEl.removeAttribute('aria-busy');
        listEl.innerHTML = `<p class="empty">포스트 목록을 불러올 수 없습니다.<br><small>${escapeHtml(err.message)}</small></p>`;
      });

    function formatDate(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
